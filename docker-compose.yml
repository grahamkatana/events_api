services:
  app:
    build: .
    container_name: events_api_app
    restart: unless-stopped
    # Loads everything from your .env by default (JWT_SECRET,
    # DIGITAL_SAMBA_*, MINIO_PUBLIC_URL, etc.) — then `environment:`
    # below overrides JUST the values that need to differ when running
    # INSIDE Docker's network versus running directly on your machine.
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://events_user:events_password@postgres:5432/events_db
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      MINIO_ENDPOINT: http://minio:9000
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - mailhog
      - minio
    volumes:
      - ./storage/logs:/app/storage/logs

  postgres:
    image: postgres:16-alpine
    container_name: events_api_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: events_user
      POSTGRES_PASSWORD: events_password
      POSTGRES_DB: events_db
    ports:
      # host_port:container_port — Postgres normally uses 5432,
      # we're mapping it to 5455 on your machine on purpose,
      # so it's clearly "our experiment's" Postgres, not the default one.
      - "5455:5432"
    volumes:
      # Persists database data on your machine, so data survives
      # `docker compose down` / container restarts.
      - events_pg_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    container_name: events_api_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - postgres

  mailhog:
    image: mailhog/mailhog:latest
    container_name: events_api_mailhog
    restart: unless-stopped
    ports:
      # SMTP — this is what our Rust app connects to, to "send" mail
      - "1026:1025"
      # Web UI — open this in your browser to see captured emails
      - "8026:8025"

  minio:
    image: minio/minio:latest
    container_name: events_api_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    command: server /data --console-address ":9090"
    ports:
      # S3-compatible API — this is what our Rust app talks to
      - "9100:9000"
      # Web console — browse uploaded files at http://localhost:9101
      - "9101:9090"
    volumes:
      - events_minio_data:/data

volumes:
  events_pg_data:
  events_minio_data: